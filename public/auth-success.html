<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Signing you in...</title>
<style>
  body { font-family: Arial, sans-serif; background: #0b0d14; color: #e8ecff;
         display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
  .box { text-align: center; }
  .spinner { width: 40px; height: 40px; border: 3px solid #1e2438; border-top-color: #4f6ef7;
             border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  h2 { font-size: 18px; margin-bottom: 8px; }
  p  { font-size: 13px; color: #8a92b2; }
</style>
</head>
<body>
<div class="box">
  <div class="spinner"></div>
  <h2 id="title">Signing you in...</h2>
  <p id="sub">Please wait</p>
</div>
<script>
  const params = new URLSearchParams(window.location.search);
  const token  = params.get('token');
  const error  = params.get('error');

  if (error || !token) {
    document.getElementById('title').textContent = 'Sign-in failed';
    document.getElementById('sub').textContent   = 'Redirecting back...';
    setTimeout(() => window.location.href = '/auth.html', 2000);
  } else {
    localStorage.setItem('invoicepro_token', token);
    document.getElementById('title').textContent = 'Signed in!';
    document.getElementById('sub').textContent   = 'Redirecting to dashboard...';
    setTimeout(() => window.location.href = '/landing.html', 1200);
  }
</script>
</body>
</html>
