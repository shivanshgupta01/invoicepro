<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>InvoicePro | Sales Voucher</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<!-- INSTANT THEME LOAD: Prevents white flash -->
<script>
  const savedTheme = localStorage.getItem('ip_theme') || 'dark';
  document.documentElement.setAttribute('data-theme', savedTheme);

<style>
*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --blue: #4f6ef7; --green: #10b981; --red: #ef4444;
  --r: 6px; --r-panel: 8px;
}
/* DARK MODE COLORS */
[data-theme="dark"] {
  --bg: #11141e; --panel: #1b202e; --input-bg: #11141e;
  --border: #2a3143; --border-focus: #4f6ef7;
  --text: #e2e8f0; --text-dim: #8c96a8;
}
/* LIGHT MODE COLORS */
[data-theme="light"] {
  --bg: #f1f5f9; --panel: #ffffff; --input-bg: #f8fafc;
  --border: #cbd5e1; --border-focus: #4f6ef7;
  --text: #0f172a; --text-dim: #64748b;
}

body {
  font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text);
  height: 100vh; display: flex; flex-direction: column; overflow: hidden;
}
/* ─── TOP BAR ─── */
.topbar {
  height: 50px; display: flex; align-items: center; justify-content: space-between;
  padding: 0 16px; background: var(--panel); border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.brand { font-weight: 700; font-size: 16px; display: flex; align-items: center; gap: 6px; }
.brand em { color: var(--blue); font-style: normal; }
.brand-sub { color: var(--text-dim); font-size: 13px; font-weight: 400; }
.top-actions { display: flex; align-items: center; gap: 10px; }
.user-email { font-size: 12px; color: var(--text-dim); margin: 0 8px; }
.btn {
  padding: 6px 12px; border-radius: var(--r); border: 1px solid var(--border);
  background: transparent; color: var(--text); cursor: pointer;
  font-size: 12px; font-weight: 500; transition: 0.2s;
}
.btn:hover { background: var(--border); }
.btn.green { background: #0e9f6e; border-color: #0e9f6e; color: #fff; }
.btn.green:hover { background: #057a55; }
.btn.red { background: var(--red); border-color: var(--red); color: #fff; }
.btn.red:hover { background: #dc2626; }
.btn.outline-red { color: var(--red); border-color: transparent; }
.btn.outline-red:hover { background: rgba(239,68,68,0.1); }

/* ─── MAIN LAYOUT ─── */
.main-content { flex: 1; display: flex; flex-direction: column; padding: 10px; gap: 10px; min-height: 0; }
.panel { background: var(--panel); border: 1px solid var(--border); border-radius: var(--r-panel); padding: 12px; }
.panel-title { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 10px; color: var(--text-dim); }
.panel-title.blue { color: #3b82f6; }
.panel-title.green { color: #10b981; }
.grid { display: grid; gap: 10px; }

/* ─── INPUTS ─── */
.field { display: flex; flex-direction: column; gap: 4px; }
.field label { font-size: 10px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; }
.input {
  background: var(--input-bg); border: 1px solid var(--border); border-radius: var(--r);
  color: var(--text); padding: 0 10px; height: 32px; font-size: 13px; width: 100%; outline: none; transition: 0.2s;
}
.input:focus { border-color: var(--border-focus); }
.input::placeholder { color: #94a3b8; }

/* ─── TOP PANELS ─── */
.top-section { display: grid; grid-template-columns: 0.9fr 1.3fr 1.3fr; gap: 10px; flex-shrink: 0; }
.price-type {
  margin-top: 12px; font-size: 11px; font-weight: 500; color: var(--text-dim);
  display: flex; align-items: center; gap: 14px; background: var(--input-bg);
  padding: 6px 10px; border-radius: var(--r); border: 1px solid var(--border);
}
.price-type input[type="radio"] { accent-color: var(--blue); margin-right: 4px; cursor: pointer; }
.price-type label { display: flex; align-items: center; cursor: pointer; color: var(--text); }

/* ─── TABLE SECTION ─── */
.table-section { flex: 1; background: var(--panel); border: 1px solid var(--border); border-radius: var(--r-panel); display: flex; flex-direction: column; min-height: 0; }
.table-wrap { flex: 1; overflow-y: auto; }
table { width: 100%; border-collapse: collapse; }
th { position: sticky; top: 0; background: var(--bg); z-index: 10; font-size: 10px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; padding: 8px 10px; text-align: left; border-bottom: 1px solid var(--border); }
td { padding: 6px 10px; border-bottom: 1px solid var(--border); }
th:last-child, td:last-child { text-align: right; }
.td-input { background: transparent; border: 1px solid transparent; color: var(--text); height: 28px; width: 100%; font-size: 13px; padding: 0 6px; outline: none; border-radius: 4px; }
.td-input:focus, .td-input:hover { border-color: var(--border); background: var(--input-bg); }
.td-input.right { text-align: right; }
.table-footer { padding: 10px; border-top: 1px solid var(--border); background: var(--panel); flex-shrink: 0; }
.add-btn { background: transparent; border: 1px solid var(--blue); color: var(--blue); padding: 6px 12px; border-radius: var(--r); font-size: 12px; font-weight: 500; cursor: pointer; transition: 0.2s; }
.add-btn:hover { background: rgba(79,110,247,0.1); }

/* Remove button */
.del-btn { color: var(--red); cursor: pointer; background: transparent; border: none; font-size: 16px; opacity: 0.5; transition: 0.2s; }
.del-btn:hover { opacity: 1; }

/* ─── BOTTOM PANELS ─── */
.bottom-section { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 10px; flex-shrink: 0; }
.summary-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.summary-row label { font-size: 12px; font-weight: 600; color: var(--text); }
.summary-row .input { width: 110px; text-align: right; font-weight: 600; }
.grand-total-box { display: flex; flex-direction: column; justify-content: space-between; }
.gt-header { display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 1px solid var(--border); padding-bottom: 12px; margin-bottom: 12px; }
.gt-title { font-size: 10px; font-weight: 700; color: var(--text-dim); letter-spacing: 0.05em; }
.gt-amount { font-size: 28px; font-weight: 700; font-family: 'JetBrains Mono', monospace; line-height: 1; color: var(--text); }
.gt-actions { display: flex; gap: 8px; justify-content: flex-end; }
</style>
</head>

<script>
// Auto-fill today's date
document.getElementById('invDate').valueAsDate = new Date();

let db = null;

// Initialize IndexedDB
function initDB() {
  const request = indexedDB.open('InvoiceProDB', 1);
  
  request.onerror = () => {
    console.error('Database initialization failed');
  };
  
  request.onsuccess = (e) => {
    db = e.target.result;
    console.log('Database initialized successfully');
  };
  
  request.onupgradeneeded = (e) => {
    const database = e.target.result;
    if (!database.objectStoreNames.contains('invoices')) {
      const objectStore = database.createObjectStore('invoices', { keyPath: 'id' });
      objectStore.createIndex('date', 'date', { unique: false });
      objectStore.createIndex('partyName', 'partyName', { unique: false });
      objectStore.createIndex('vchNo', 'vchNo', { unique: false });
    }
  };
}

// --- AUTH & INITIALIZATION ---
document.addEventListener('DOMContentLoaded', () => {
  initDB();
  
  // 1. JWT decoding for user email
  const token = localStorage.getItem('invoicepro_token');
  const emailEl = document.getElementById('topEmail');
  if (token) {
    try {
      const payloadBase64 = token.split('.')[1];
      const decodedJson = atob(payloadBase64.replace(/-/g, '+').replace(/_/g, '/'));
      const decoded = JSON.parse(decodedJson);
      const user = decoded.user || decoded;
      if (emailEl) emailEl.textContent = user.email || 'No email';
    } catch(e) {
      if (emailEl) emailEl.textContent = 'Not signed in';
    }
  } else {
    if (emailEl) emailEl.textContent = 'Not signed in';
  }

  // 2. Auto-fill "Supplier Details" from LocalStorage Firm
  const firms = JSON.parse(localStorage.getItem('ip_firms') || '[]');
  const activeFirmId = localStorage.getItem('ip_active_firm');

  if (firms.length > 0 && activeFirmId) {
    const activeFirm = firms.find(f => String(f.id) === String(activeFirmId));
    if (activeFirm) {
      const nameInput    = document.getElementById('supplierName');
      const addressInput = document.getElementById('supplierAddress');
      const gstinInput   = document.getElementById('supplierGstin');
      const phoneInput   = document.getElementById('supplierPhone');
      const emailInput   = document.getElementById('supplierEmail');

      if (nameInput)    nameInput.value    = activeFirm.name || '';
      if (addressInput) addressInput.value = activeFirm.address || '';
      if (gstinInput)   gstinInput.value   = activeFirm.gstin || '';
      if (phoneInput)   phoneInput.value   = activeFirm.mainMobile || '';
      if (emailInput)   emailInput.value   = activeFirm.email || '';
    }
  }
});

function logout() {
  localStorage.removeItem('invoicepro_token');
  window.location.href = 'auth.html';
}

// --- CALCULATIONS ENGINE ---
function calculateInvoice() {
  const isExclusive = document.getElementById('ptExclusive').checked;
  const supplierState = document.getElementById('supplierState').value;
  const buyerState = document.getElementById('buyerState').value;
  const isInterState = supplierState !== buyerState;

  const discount = parseFloat(document.getElementById('inDiscount').value) || 0;
  const freight = parseFloat(document.getElementById('inFreight').value) || 0;

  let totalGross = 0;
  const rowsData = [];
  const rows = document.querySelectorAll('#tableBody tr');

  rows.forEach(row => {
    const qty = parseFloat(row.querySelector('.calc-qty').value) || 0;
    const price = parseFloat(row.querySelector('.calc-price').value) || 0;
    const taxRate = parseFloat(row.querySelector('.calc-tax').value) || 0;
    const amountInput = row.querySelector('.calc-amount');

    const gross = qty * price;
    amountInput.value = gross.toFixed(2);
    totalGross += gross;

    rowsData.push({ gross, taxRate });
  });

  let totalTaxable = 0;
  let totalTaxAmount = 0;

  rowsData.forEach(row => {
    if (row.gross > 0) {
      const rowDiscount = totalGross > 0 ? (row.gross / totalGross) * discount : 0;
      const rowNet = Math.max(0, row.gross - rowDiscount);

      let taxable = 0;
      let tax = 0;

      if (isExclusive) {
        taxable = rowNet;
        tax = taxable * (row.taxRate / 100);
      } else {
        taxable = rowNet / (1 + (row.taxRate / 100));
        tax = rowNet - taxable;
      }

      totalTaxable += taxable;
      totalTaxAmount += tax;
    }
  });

  document.getElementById('sumTaxable').value = totalTaxable.toFixed(2);

  if (isInterState) {
    document.getElementById('lblCgst').textContent = 'IGST (₹)';
    document.getElementById('sumCgst').value = totalTaxAmount.toFixed(2);
    document.getElementById('rowSgst').style.display = 'none';
  } else {
    document.getElementById('lblCgst').textContent = 'CGST (₹)';
    document.getElementById('rowSgst').style.display = 'flex';
    document.getElementById('sumCgst').value = (totalTaxAmount / 2).toFixed(2);
    document.getElementById('sumSgst').value = (totalTaxAmount / 2).toFixed(2);
  }

  const grandTotal = totalTaxable + totalTaxAmount + freight;
  document.getElementById('grandTotal').textContent = '₹' + Math.max(0, grandTotal).toLocaleString('en-IN', {minimumFractionDigits: 2, maximumFractionDigits: 2});
}

document.addEventListener('input', function(e) {
  if (
    e.target.classList.contains('calc-qty') ||
    e.target.classList.contains('calc-price') ||
    e.target.classList.contains('calc-tax') ||
    e.target.id === 'inFreight' ||
    e.target.id === 'inDiscount' ||

// AUTO-FETCH GST DETAILS FUNCTION
function setupGSTAutoFetch(gstinId, nameId, addressId, stateId) {
  const gstinInput = document.getElementById(gstinId);
  if (!gstinInput) return;

  gstinInput.addEventListener('input', async (e) => {
    let gstin = e.target.value.toUpperCase();
    e.target.value = gstin;
    
    const gstRegex = /^[0-9]{2}[A-Z]{5}[0-9]{4}[A-Z]{1}[1-9A-Z]{1}Z[0-9A-Z]{1}$/;
    
    if (gstin.length === 15 && gstRegex.test(gstin)) {
      const nameInput = document.getElementById(nameId);
      const oldName = nameInput.value;
      nameInput.value = "Fetching from GST Portal...";
      
      try {
        const res = await fetch(`/api/gst/verify/${gstin}`);
        const result = await res.json();
        
        if (result.success && result.data) {
          nameInput.value = result.data.business_name || '';
          document.getElementById(addressId).value = result.data.address || '';
          
          const stateCode = gstin.substring(0, 2);
          const stateMap = { 
            '01': 'JK', '02': 'HP', '03': 'PB', '04': 'CH', '05': 'UK', 
            '06': 'HR', '07': 'DL', '08': 'RJ', '09': 'UP', '10': 'BR', 
            '11': 'SK', '12': 'AR', '13': 'NL', '14': 'MN', '15': 'MZ', 
            '16': 'TR', '17': 'ML', '18': 'AS', '19': 'WB', '20': 'JH', 
            '21': 'OR', '22': 'CG', '23': 'MP', '24': 'GJ', '25': 'DN', 
            '26': 'DN', '27': 'MH', '28': 'AP', '29': 'KA', '30': 'GA', 
            '31': 'LD', '32': 'KL', '33': 'TN', '34': 'PY', '35': 'AN', 
            '36': 'TS', '37': 'AP', '38': 'LA' 
          };
          
          if (stateMap[stateCode]) {
            document.getElementById(stateId).value = stateMap[stateCode];
            calculateInvoice(); 
          }
        } else {
          nameInput.value = oldName; 
        }
      } catch (err) {
        nameInput.value = oldName;
      }
    }
  });
}

// --- SAVE VOUCHER FUNCTION ---
function saveVoucher() {
  // Validation
  const vchNo = document.getElementById('vchNo').value.trim();
  const date = document.getElementById('invDate').value;
  const placeOfSupply = document.getElementById('placeOfSupply').value.trim();
  
  const supplierName = document.getElementById('supplierName').value.trim();
  const supplierGstin = document.getElementById('supplierGstin').value.trim();
  const supplierAddress = document.getElementById('supplierAddress').value.trim();
  const supplierState = document.getElementById('supplierState').value;
  const supplierPhone = document.getElementById('supplierPhone').value.trim();
  const supplierEmail = document.getElementById('supplierEmail').value.trim();
  
  const partyName = document.getElementById('clientName').value.trim();
  const partyGstin = document.getElementById('clientGstin').value.trim();
  const partyAddress = document.getElementById('clientAddress').value.trim();
  const buyerState = document.getElementById('buyerState').value;
  const partyPhone = document.getElementById('clientPhone').value.trim();
  const partyEmail = document.getElementById('clientEmail').value.trim();
  
  const narration = document.getElementById('narration').value.trim();
  const vehicleNumber = document.getElementById('vehicleNumber').value.trim();
  const driverName = document.getElementById('driverName').value.trim();
  const transporterId = document.getElementById('transporterId').value.trim();
  const transporterName = document.getElementById('transporterName').value.trim();
  
  // Collect items
  const items = [];
  document.querySelectorAll('#tableBody tr').forEach(row => {
    const description = row.querySelectorAll('td')[1].querySelector('.td-input').value.trim();
    const hsn = row.querySelectorAll('td')[2].querySelector('.td-input').value.trim();
    const taxRate = parseFloat(row.querySelector('.calc-tax').value) || 0;
    const qty = parseFloat(row.querySelector('.calc-qty').value) || 0;
    const unit = row.querySelectorAll('td')[5].querySelector('.td-input').value || 'Nos';
    const price = parseFloat(row.querySelector('.calc-price').value) || 0;
    const amount = parseFloat(row.querySelector('.calc-amount').value) || 0;
    
    if (description && qty > 0 && price > 0) {
      items.push({ description, hsn, taxRate, qty, unit, price, amount });
    }
  });
  
  // Validation checks
  if (!vchNo) {
    alert('⚠️ Please enter Invoice Number');
    return;
  }
  if (!date) {
    alert('⚠️ Please select Invoice Date');
    return;
  }
  if (!supplierName) {
    alert('⚠️ Please enter your Company Name');
    return;
  }
  if (!partyName) {
    alert('⚠️ Please enter Party/Client Name');
    return;
  }
  if (items.length === 0) {
    alert('⚠️ Please add at least one item to the invoice');
    return;
  }
  
  // Get totals from UI
  const totalTaxable = parseFloat(document.getElementById('sumTaxable').value) || 0;
  const isInterState = supplierState !== buyerState;
  const cgstSgst = isInterState ? 0 : (parseFloat(document.getElementById('sumCgst').value) || 0);
  const igst = isInterState ? (parseFloat(document.getElementById('sumCgst').value) || 0) : 0;
  const freight = parseFloat(document.getElementById('inFreight').value) || 0;
  const discount = parseFloat(document.getElementById('inDiscount').value) || 0;
  const grandTotal = parseFloat(document.getElementById('grandTotal').textContent.replace('₹', '').replace(/,/g, '')) || 0;
  
  const priceType = document.getElementById('ptExclusive').checked ? 'exclusive' : 'inclusive';
  const revCharge = document.getElementById('revCharge').value;
  
  // Create invoice object
  const invoice = {
    id: 'inv_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9),
    vchNo,
    date,
    placeOfSupply,
    priceType,
    revCharge,
    status: 'Saved',
    supplier: {
      name: supplierName,
      gstin: supplierGstin,
      address: supplierAddress,
      state: supplierState,
      phone: supplierPhone,
      email: supplierEmail
    },
    party: {
      name: partyName,
      gstin: partyGstin,
      address: partyAddress,
      state: buyerState,
      phone: partyPhone,
      email: partyEmail
    },
    items,
    totals: {
      taxable: totalTaxable,
      cgst: cgstSgst,
      sgst: cgstSgst,
      igst: igst,
      freight,
      discount,
      grandTotal
    },
    transport: {
      vehicleNumber,
      driverName,
      transporterId,
      transporterName
    },
    narration,
    createdAt: new Date().toISOString(),
    updatedAt: new Date().toISOString()
  };
  
  // Save to IndexedDB
  if (!db) {
    alert('❌ Database not initialized. Please refresh and try again.');
    return;
  }
  
  const transaction = db.transaction(['invoices'], 'readwrite');
  const store = transaction.objectStore('invoices');
  const request = store.add(invoice);
  
  request.onerror = () => {
    showErrorModal('Error saving invoice. Please try again.');
    console.error('Save error:', request.error);
  };
  
  request.onsuccess = () => {
    showSuccessModal(vchNo, grandTotal);
  };
  
  transaction.onerror = () => {
    showErrorModal('Transaction failed. Please try again.');
  };
}
