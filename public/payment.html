<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>InvoicePro | Payment</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script>
  const savedTheme = localStorage.getItem('ip_theme') || 'dark';
  document.documentElement.setAttribute('data-theme', savedTheme);
</script>
<style>
*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --blue: #4f6ef7; --green: #10b981; --red: #ef4444; --amber: #f59e0b;
  --r: 6px; --r-panel: 8px;
}
/* DARK MODE COLORS */
[data-theme="dark"] {
  --bg: #11141e; --panel: #1b202e; --input-bg: #11141e;
  --border: #2a3143; --border-focus: #4f6ef7;
  --text: #e2e8f0; --text-dim: #8c96a8;
  --modal-overlay: rgba(0, 0, 0, 0.6);
  --modal-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
}
/* LIGHT MODE COLORS */
[data-theme="light"] {
  --bg: #f1f5f9; --panel: #ffffff; --input-bg: #f8fafc;
  --border: #cbd5e1; --border-focus: #4f6ef7;
  --text: #0f172a; --text-dim: #64748b;
  --modal-overlay: rgba(15, 23, 42, 0.4);
  --modal-shadow: 0 20px 60px rgba(100, 116, 139, 0.15);
}

body {
  font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text);
  height: 100vh; display: flex; flex-direction: column; overflow: hidden;
}

/* ─── TOP BAR ─── */
.topbar {
  height: 50px; display: flex; align-items: center; justify-content: space-between;
  padding: 0 16px; background: var(--panel); border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.brand { font-weight: 700; font-size: 16px; display: flex; align-items: center; gap: 6px; }
.brand em { color: var(--blue); font-style: normal; }
.brand-sub { color: var(--text-dim); font-size: 13px; font-weight: 400; }
.top-actions { display: flex; align-items: center; gap: 10px; }
.user-email { font-size: 12px; color: var(--text-dim); margin: 0 8px; }
.btn {
  padding: 6px 12px; border-radius: var(--r); border: 1px solid var(--border);
  background: transparent; color: var(--text); cursor: pointer;
  font-size: 12px; font-weight: 500; transition: 0.2s;
}
.btn:hover { background: var(--border); }
.btn.green { background: #0e9f6e; border-color: #0e9f6e; color: #fff; }
.btn.green:hover { background: #057a55; }
.btn.red { background: var(--red); border-color: var(--red); color: #fff; }
.btn.red:hover { background: #dc2626; }
.btn.outline-red { color: var(--red); border-color: transparent; }
.btn.outline-red:hover { background: rgba(239,68,68,0.1); }

/* ─── MAIN LAYOUT ─── */
.main-content { flex: 1; display: flex; flex-direction: column; padding: 10px; gap: 10px; min-height: 0; overflow-y: auto; }
.panel { background: var(--panel); border: 1px solid var(--border); border-radius: var(--r-panel); padding: 12px; }
.panel-title { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 10px; color: var(--text-dim); }
.panel-title.blue { color: #3b82f6; }
.panel-title.green { color: #10b981; }
.panel-title.amber { color: #f59e0b; }
.grid { display: grid; gap: 10px; }

/* ─── INPUTS ─── */
.field { display: flex; flex-direction: column; gap: 4px; }
.field label { font-size: 10px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; }
.input {
  background: var(--input-bg); border: 1px solid var(--border); border-radius: var(--r);
  color: var(--text); padding: 0 10px; height: 32px; font-size: 13px; width: 100%; outline: none; transition: 0.2s;
}
.input:focus { border-color: var(--border-focus); }
.input::placeholder { color: #94a3b8; }
.input[readonly] { color: #10b981; }

/* ─── TOP PANELS ─── */
.top-section { display: grid; grid-template-columns: 0.9fr 1.3fr 1.3fr; gap: 10px; flex-shrink: 0; }
.payment-type {
  margin-top: 12px; font-size: 11px; font-weight: 500; color: var(--text-dim);
  display: flex; align-items: center; gap: 14px; background: var(--input-bg);
  padding: 6px 10px; border-radius: var(--r); border: 1px solid var(--border);
}

/* ─── TABLE SECTION ─── */
.table-section { flex: 1; background: var(--panel); border: 1px solid var(--border); border-radius: var(--r-panel); display: flex; flex-direction: column; min-height: 200px; }
.table-wrap { flex: 1; overflow-y: auto; }
table { width: 100%; border-collapse: collapse; }
th { position: sticky; top: 0; background: var(--bg); z-index: 10; font-size: 10px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; padding: 8px 10px; text-align: left; border-bottom: 1px solid var(--border); }
td { padding: 6px 10px; border-bottom: 1px solid var(--border); }
th:last-child, td:last-child { text-align: right; }
.td-input { background: transparent; border: 1px solid transparent; color: var(--text); height: 28px; width: 100%; font-size: 13px; padding: 0 6px; outline: none; border-radius: 4px; font-family: 'Inter', sans-serif;}
.td-input:focus, .td-input:hover { border-color: var(--border); background: var(--input-bg); }
.td-input.right { text-align: right; }
.table-footer { padding: 10px; border-top: 1px solid var(--border); background: var(--panel); flex-shrink: 0; }
.add-btn { background: transparent; border: 1px solid var(--blue); color: var(--blue); padding: 6px 12px; border-radius: var(--r); font-size: 12px; font-weight: 500; cursor: pointer; transition: 0.2s; }
.add-btn:hover { background: rgba(79,110,247,0.1); }
.del-btn { color: var(--red); cursor: pointer; background: transparent; border: none; font-size: 16px; opacity: 0.5; transition: 0.2s; }
.del-btn:hover { opacity: 1; }

/* ─── BOTTOM PANELS ─── */
.bottom-section { display: grid; grid-template-columns: 1fr 1fr 1.3fr 1.2fr; gap: 10px; flex-shrink: 0; }
.summary-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.summary-row label { font-size: 12px; font-weight: 600; color: var(--text); }
.summary-row .input { width: 110px; text-align: right; font-weight: 600; }
.grand-total-box { display: flex; flex-direction: column; justify-content: space-between; }
.gt-header { display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 1px solid var(--border); padding-bottom: 12px; margin-bottom: 12px; }
.gt-title { font-size: 10px; font-weight: 700; color: var(--text-dim); letter-spacing: 0.05em; }
.gt-amount { font-size: 28px; font-weight: 700; font-family: 'JetBrains Mono', monospace; line-height: 1; color: var(--text); }
.gt-actions { display: flex; gap: 8px; justify-content: flex-end; }

/* ─── MODAL ANIMATIONS ─── */
@keyframes fadeInOverlay { from { opacity: 0; backdrop-filter: blur(0px); } to { opacity: 1; backdrop-filter: blur(4px); } }
@keyframes slideUpModal { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--border-focus); }
</style>
</head>

<script>
// Auto-fill dates
const today = new Date();
document.getElementById('issueDate').valueAsDate = today;
const dueDate = new Date(today);
dueDate.setDate(dueDate.getDate() + 7); // Default due date 7 days
document.getElementById('dueDate').valueAsDate = dueDate;

let db = null;

// Initialize IndexedDB
function initDB() {
  const request = indexedDB.open('InvoiceProDB', 1);
  request.onerror = () => console.error('Database initialization failed');
  request.onsuccess = (e) => {
    db = e.target.result;
    console.log('Database initialized successfully');
  };
  request.onupgradeneeded = (e) => {
    const database = e.target.result;
    if (!database.objectStoreNames.contains('invoices')) {
      const objectStore = database.createObjectStore('invoices', { keyPath: 'id' });
      objectStore.createIndex('date', 'date', { unique: false });
      objectStore.createIndex('partyName', 'partyName', { unique: false });
      objectStore.createIndex('vchNo', 'vchNo', { unique: false });
    }
  };
}

// --- AUTH & INITIALIZATION ---
document.addEventListener('DOMContentLoaded', () => {
  initDB();
  const token = localStorage.getItem('invoicepro_token');
  const emailEl = document.getElementById('topEmail');
  if (token) {
    try {
      const payloadBase64 = token.split('.')[1];
      const decodedJson = atob(payloadBase64.replace(/-/g, '+').replace(/_/g, '/'));
      const decoded = JSON.parse(decodedJson);
      const user = decoded.user || decoded;
      if (emailEl) emailEl.textContent = user.email || 'No email';
    } catch(e) {
      if (emailEl) emailEl.textContent = 'Not signed in';
    }
  } else {
    if (emailEl) emailEl.textContent = 'Not signed in';
  }

  // Auto-fill "Seller Details" from LocalStorage Firm
  const firms = JSON.parse(localStorage.getItem('ip_firms') || '[]');
  const activeFirmId = localStorage.getItem('ip_active_firm');
  if (firms.length > 0 && activeFirmId) {
    const activeFirm = firms.find(f => String(f.id) === String(activeFirmId));
    if (activeFirm) {
      document.getElementById('supplierName').value    = activeFirm.name || '';
      document.getElementById('supplierAddress').value = activeFirm.address || '';
      document.getElementById('supplierGstin').value   = activeFirm.gstin || '';
      document.getElementById('supplierPhone').value   = activeFirm.mainMobile || '';
      document.getElementById('supplierEmail').value   = activeFirm.email || '';
    }
  }
});

function logout() {
  localStorage.removeItem('invoicepro_token');
  window.location.href = 'auth.html';
}

// --- CALCULATIONS ENGINE (LITE) ---
function calculatePayment() {
  let subtotal = 0;
  const rows = document.querySelectorAll('#tableBody tr');

  rows.forEach(row => {
    const qty = parseFloat(row.querySelector('.calc-qty').value) || 0;
    const price = parseFloat(row.querySelector('.calc-price').value) || 0;
    const amountInput = row.querySelector('.calc-amount');

    const amount = qty * price;
    if(amountInput) amountInput.value = amount.toFixed(2);
    subtotal += amount;
  });

  const tax = parseFloat(document.getElementById('inTax').value) || 0;
  const discount = parseFloat(document.getElementById('inDiscount').value) || 0;
  
  const totalDue = Math.max(0, subtotal + tax - discount);
  const amountPaid = parseFloat(document.getElementById('inPaid').value) || 0;
  const balance = Math.max(0, totalDue - amountPaid);

  document.getElementById('sumSubtotal').value = subtotal.toFixed(2);
  document.getElementById('sumTotalDue').value = totalDue.toFixed(2);
  document.getElementById('sumTotalDue2').value = totalDue.toFixed(2);
  document.getElementById('sumBalance').value = balance.toFixed(2);

  document.getElementById('grandTotal').textContent = '₹' + balance.toLocaleString('en-IN', {minimumFractionDigits: 2, maximumFractionDigits: 2});
}

// Global Event Listener for Instant Calculations
document.addEventListener('input', function(e) {
  if (
    e.target.classList.contains('calc-qty') || 
    e.target.classList.contains('calc-price') ||
    e.target.id === 'inTax' || 
    e.target.id === 'inDiscount' || 
    e.target.id === 'inPaid' ||
    e.target.id === 'supplierState' ||
    e.target.id === 'buyerState'
  ) {
    calculatePayment();
  }
});

function addRow() {
  const tbody = document.getElementById('tableBody');
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td style="text-align: center;"><button class="del-btn" onclick="removeRow(this)">×</button></td>
    <td><input class="td-input" placeholder="e.g. Web Design" onchange="calculatePayment()"></td>
    <td><input class="td-input" placeholder="Details..." onchange="calculatePayment()"></td>
    <td><input class="td-input right calc-qty" type="number" value="1" min="1" onchange="calculatePayment()"></td>
    <td><input class="td-input right calc-price" type="number" placeholder="0.00" onchange="calculatePayment()"></td>
    <td><input class="td-input right calc-amount" readonly value="0.00" style="color:var(--text); font-weight:600;"></td>
  `;
  tbody.appendChild(tr);
  const wrap = document.querySelector('.table-wrap');
  wrap.scrollTop = wrap.scrollHeight;
  calculatePayment();
}

function removeRow(btn) {
  btn.closest('tr').remove();
  calculatePayment();
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'F2') {
    e.preventDefault();
    addRow();
  }
});

// AUTO-FETCH GST DETAILS FUNCTION
function setupGSTAutoFetch(gstinId, nameId, addressId, stateId) {
  const gstinInput = document.getElementById(gstinId);
  if (!gstinInput) return;

  gstinInput.addEventListener('input', async (e) => {
    let gstin = e.target.value.toUpperCase();
    e.target.value = gstin;
    
    const gstRegex = /^[0-9]{2}[A-Z]{5}[0-9]{4}[A-Z]{1}[1-9A-Z]{1}Z[0-9A-Z]{1}$/;
    
    if (gstin.length === 15 && gstRegex.test(gstin)) {
      const nameInput = document.getElementById(nameId);
      const oldName = nameInput.value;
      nameInput.value = "Fetching from GST Portal...";
      
      try {
        const res = await fetch(`/api/gst/verify/${gstin}`);
        const result = await res.json();
        
        if (result.success && result.data) {
          nameInput.value = result.data.business_name || '';
          document.getElementById(addressId).value = result.data.address || '';
          
          const stateCode = gstin.substring(0, 2);
          const stateMap = { 
            '01': 'JK', '02': 'HP', '03': 'PB', '04': 'CH', '05': 'UK', 
            '06': 'HR', '07': 'DL', '08': 'RJ', '09': 'UP', '10': 'BR', 
            '11': 'SK', '12': 'AR', '13': 'NL', '14': 'MN', '15': 'MZ', 
            '16': 'TR', '17': 'ML', '18': 'AS', '19': 'WB', '20': 'JH', 
            '21': 'OR', '22': 'CG', '23': 'MP', '24': 'GJ', '25': 'DN', 
            '26': 'DN', '27': 'MH', '28': 'AP', '29': 'KA', '30': 'GA', 
            '31': 'LD', '32': 'KL', '33': 'TN', '34': 'PY', '35': 'AN', 
            '36': 'TS', '37': 'AP', '38': 'LA' 
          };
          
          if (stateMap[stateCode]) {
            document.getElementById(stateId).value = stateMap[stateCode];
          }
        } else {
          nameInput.value = oldName; 
        }
      } catch (err) {
        nameInput.value = oldName;
      }
    }
  });
}

// --- SAVE PAYMENT FUNCTION ---
function savePayment() {
  const paymentNo = document.getElementById('paymentNo').value.trim() || 'PAY-' + Date.now();
  
  const items = [];
  document.querySelectorAll('#tableBody tr').forEach(row => {
    const inputs = row.querySelectorAll('.td-input');
    const itemService = inputs[0]?.value.trim() || '';
    const description = inputs[1]?.value.trim() || '';
    const qty = parseFloat(row.querySelector('.calc-qty').value) || 0;
    const price = parseFloat(row.querySelector('.calc-price').value) || 0;
    const amount = parseFloat(row.querySelector('.calc-amount').value) || 0;

    if (itemService || qty > 0) {
      items.push({ itemService, description, qty, price, amount });
    }
  });

  if (items.length === 0) {
    alert('⚠️ Please add at least one line item');
    return;
  }

  const totalDue = parseFloat(document.getElementById('sumTotalDue').value) || 0;
  const amountPaid = parseFloat(document.getElementById('inPaid').value) || 0;
  const balance = parseFloat(document.getElementById('sumBalance').value) || 0;
  
  let paymentStatus = 'Unpaid';
  if (amountPaid >= totalDue && totalDue > 0) paymentStatus = 'Paid';
  else if (amountPaid > 0 && amountPaid < totalDue) paymentStatus = 'Partial';

  const paymentData = {
    id: 'payment_' + Date.now(),
    docType: 'Payment',
    vchNo: paymentNo,
    date: document.getElementById('issueDate').value,
    dueDate: document.getElementById('dueDate').value,
    paymentMode: document.getElementById('paymentMode').value,
    
    supplier: {
      name: document.getElementById('supplierName').value,
      gstin: document.getElementById('supplierGstin').value,
      address: document.getElementById('supplierAddress').value,
      state: document.getElementById('supplierState').value,
      phone: document.getElementById('supplierPhone').value,
      email: document.getElementById('supplierEmail').value
    },
    
    party: {
      name: document.getElementById('clientName').value,
      gstin: document.getElementById('clientGstin').value,
      address: document.getElementById('clientAddress').value,
      state: document.getElementById('buyerState').value,
      phone: document.getElementById('clientPhone').value,
      email: document.getElementById('clientEmail').value
    },
    
    items: items,
    
    totals: {
      subtotal: parseFloat(document.getElementById('sumSubtotal').value) || 0,
      tax: parseFloat(document.getElementById('inTax').value) || 0,
      discount: parseFloat(document.getElementById('inDiscount').value) || 0,
      totalDue: totalDue,
      amountPaid: amountPaid,
      balance: balance,
      grandTotal: totalDue 
    },
    
    instructions: {
      bankDetails: document.getElementById('bankDetails').value,
      upiDetails: document.getElementById('upiDetails').value,
      notes: document.getElementById('paymentNotes').value
    },
    
    status: paymentStatus,
    createdAt: new Date().toISOString()
  };

  if (!db) {
    showErrorModal('Database not initialized. Please refresh and try again.');
    return;
  }
  
  const transaction = db.transaction(['invoices'], 'readwrite');
  const store = transaction.objectStore('invoices');
  const request = store.add(paymentData);
  
  request.onsuccess = () => {
    showSuccessModal(paymentNo, balance);
  };
  
  request.onerror = () => {
    showErrorModal('Error saving payment voucher. Please try again.');
  };
}

// --- BEAUTIFUL THEME-AWARE MODALS ---
function showSuccessModal(titleOrDocNo, balance) {
  const existingModal = document.getElementById('successModal');
  if (existingModal) existingModal.remove();
  
  const modalOverlay = document.createElement('div');
  modalOverlay.id = 'successModal';
  modalOverlay.style.cssText = `
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: var(--modal-overlay); backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center;
    z-index: 40000; animation: fadeInOverlay 0.3s ease;
  `;
  
  const modal = document.createElement('div');
  modal.style.cssText = `
    background: linear-gradient(135deg, var(--panel) 0%, rgba(16, 185, 129, 0.05) 100%);
    border: 1px solid rgba(16, 185, 129, 0.3); border-radius: 20px;
    padding: 40px; max-width: 400px; width: 90%;
    box-shadow: var(--modal-shadow);
    text-align: center; animation: slideUpModal 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  `;
  
  const checkmarkSvg = `
    <svg width="80" height="80" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" style="margin: 0 auto 24px;">
      <circle cx="50" cy="50" r="48" fill="rgba(16, 185, 129, 0.15)" stroke="#10b981" stroke-width="2"/>
      <path d="M32 52L45 65L70 35" stroke="#10b981" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </svg>
  `;
  
  const formattedAmount = balance !== null ? balance.toLocaleString('en-IN', {minimumFractionDigits: 2, maximumFractionDigits: 2}) : '0.00';
  
  modal.innerHTML = `
    ${checkmarkSvg}
    <h2 style="color: var(--text); font-size: 24px; font-weight: 700; margin: 0 0 8px 0; letter-spacing: -0.5px;">Saved Successfully!</h2>
    <p style="color: var(--text-dim); font-size: 14px; margin: 0 0 24px 0; line-height: 1.5;">Your payment voucher has been successfully updated and saved.</p>
    
    <div style="background: var(--input-bg); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 24px;">
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
        <div style="text-align: left;">
          <p style="color: var(--text-dim); font-size: 11px; margin: 0 0 4px 0; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600;">Payment #</p>
          <p style="color: var(--text); font-size: 16px; font-weight: 700; margin: 0; font-family: 'JetBrains Mono', monospace;">${titleOrDocNo}</p>
        </div>
        <div style="text-align: right;">
          <p style="color: var(--text-dim); font-size: 11px; margin: 0 0 4px 0; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600;">Balance Remaining</p>
          <p style="color: #f59e0b; font-size: 16px; font-weight: 700; margin: 0; font-family: 'JetBrains Mono', monospace;">₹${formattedAmount}</p>
        </div>
      </div>
    </div>
    
    <div style="display: flex; gap: 10px;">
      <button id="closeSuccessBtn" style="flex: 1; padding: 14px 10px; background: transparent; border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s ease;">
        Close
      </button>
      <button id="newPaymentBtn" style="flex: 2; padding: 14px 10px; background: #10b981; border: none; border-radius: 10px; color: #fff; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s ease;">
        Create New Payment
      </button>
    </div>
  `;
  
  modalOverlay.appendChild(modal);
  document.body.appendChild(modalOverlay);
  
  // Handlers to give you control over redirects
  document.getElementById('closeSuccessBtn').addEventListener('click', () => {
    modalOverlay.remove();
  });
  
  document.getElementById('newPaymentBtn').addEventListener('click', () => {
    modalOverlay.remove();
    location.reload(); 
  });
  
  // Click outside to dismiss
  modalOverlay.addEventListener('click', (e) => {
    if (e.target === modalOverlay) {
      modalOverlay.remove();
    }
  });
}
